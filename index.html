<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Genially Game Builder v14.0</title>
    <style>
        :root { --accent: #bc13fe; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #111; color: white; }
        #panel { width: 360px; background: #1a1a1a; padding: 20px; overflow-y: auto; border-right: 2px solid var(--accent); }
        .card { background: #252525; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        input { width: 100%; padding: 8px; margin: 5px 0; background: #000; color: #00f7ff; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; }
        label { font-size: 11px; color: #888; text-transform: uppercase; display: block; margin-top: 10px; }
        #view { flex-grow: 1; padding: 20px; background: #000; display: flex; flex-direction: column; }
        .preview-win { flex-grow: 1; border: 1px solid #333; border-radius: 12px; overflow: hidden; background: #050505; position: relative; }
        .btn-copy { background: var(--accent); color: white; padding: 16px; width: 100%; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .lang-btn { float: right; background: #333; color: #fff; border: none; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

<div id="panel">
    <button class="lang-btn" onclick="toggleLang()">RU / EN</button>
    <h2 id="t-title">Редактор v14.0</h2>
    
    <label id="l-hero">Герой (URL):</label>
    <input type="text" id="h-url" value="https://cdn-icons-png.flaticon.com/512/616/616430.png" oninput="draw()">
    
    <label id="l-col">Цвет лестницы:</label>
    <input type="color" id="h-col" value="#bc13fe" oninput="draw()">

    <label id="l-win">Текст победы:</label>
    <input type="text" id="w-msg" value="EXCELLENT! MISSION COMPLETE" oninput="draw()">

    <label id="l-lose">Текст проигрыша:</label>
    <input type="text" id="l-msg" value="GAME OVER! TRY AGAIN" oninput="draw()">
    
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyIt()" id="b-copy">СКОПИРОВАТЬ ДЛЯ GENIALLY</button>
</div>

<div id="view">
    <div id="f-box" class="preview-win"></div>
</div>

<script>
    let lang = 'ru';
    const ui = {
        ru: { title: "Редактор v14.0", hero: "Герой (URL)", col: "Цвет лестницы", win: "Текст победы", lose: "Текст проигрыша", copy: "СКОПИРОВАТЬ ДЛЯ GENIALLY" },
        en: { title: "Editor v14.0", hero: "Hero URL", col: "Stair Color", win: "Win Message", lose: "Lose Message", copy: "COPY FOR GENIALLY" }
    };

    let qs = Array(14).fill().map((_, i) => ({ q: `Question ${i+1}?`, a: ["Right", "Wrong", "Wrong"], c: 0 }));

    function toggleLang() {
        lang = (lang === 'ru') ? 'en' : 'ru';
        document.getElementById('t-title').innerText = ui[lang].title;
        document.getElementById('l-hero').innerText = ui[lang].hero;
        document.getElementById('l-col').innerText = ui[lang].col;
        document.getElementById('l-win').innerText = ui[lang].win;
        document.getElementById('l-lose').innerText = ui[lang].lose;
        document.getElementById('b-copy').innerText = ui[lang].copy;
        render();
    }

    function render() {
        const c = document.getElementById('q-list'); c.innerHTML = '';
        qs.forEach((q, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<input type="text" value="${q.q}" oninput="qs[${i}].q=this.value;draw()">
            <div style="display:flex;gap:2px"><input type="text" value="${q.a[0]}" oninput="qs[${i}].a[0]=this.value;draw()"><input type="text" value="${q.a[1]}" oninput="qs[${i}].a[1]=this.value;draw()"><input type="text" value="${q.a[2]}" oninput="qs[${i}].a[2]=this.value;draw()"></div>`;
            c.appendChild(d);
        });
    }

    function getCode() {
        const h = document.getElementById('h-url').value;
        const col = document.getElementById('h-col').value;
        const wm = document.getElementById('w-msg').value;
        const lm = document.getElementById('l-msg').value;
        const data = JSON.stringify(qs);

        return `<iframe srcdoc='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body,html{margin:0;padding:0;overflow:hidden;background:#000;height:600px;width:100%;font-family:sans-serif}.p{position:absolute;width:60px;height:15px;background:${col};border-radius:10px;box-shadow:0 5px 15px ${col}66;transition:0.4s;opacity:0.2}.p.act{opacity:1;border:2px solid #fff}#h{position:absolute;width:50px;height:60px;z-index:10;transition:0.5s;bottom:0}#q{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(20,20,20,0.95);border:2px solid ${col};border-radius:20px;padding:25px;width:280px;color:#fff;text-align:center;z-index:100;backdrop-filter:blur(10px);display:none}.bt{background:rgba(255,255,255,0.1);border:1px solid ${col};color:#fff;width:100%;padding:12px;margin:6px 0;border-radius:12px;cursor:pointer;font-weight:bold;transition:0.2s}#s{position:absolute;top:10px;left:10px;color:#fff;z-index:110;display:flex;gap:8px}.i{background:rgba(0,0,0,0.8);padding:6px 12px;border-radius:8px;border:1px solid ${col};font-size:12px}</style></head><body><div id="s"><div class="i" id="hp">❤️ ❤️ ❤️</div><div class="i" id="st">STEP: 1/14</div></div><img id="h" src="${h}"><div id="q"><div id="qt" style="font-size:18px;margin-bottom:15px"></div><div id="as"></div></div><script>const tasks=${data};let cur=0,liv=3;const h=document.getElementById("h");const pls=[];for(let i=0;i<15;i++){const p=document.createElement("div");p.className="p";p.style.left=(20+(i*55))+"px";p.style.top=(520-(i*30))+"px";document.body.appendChild(p);pls.push(p)}function upd(){const t=pls[cur];h.style.left=(parseInt(t.style.left)+5)+"px";h.style.top=(parseInt(t.style.top)-65)+"px";pls.forEach((p,i)=>p.classList.toggle("act",i<=cur))}function uQ(){if(cur>=14){f(true);return}document.getElementById("st").innerText="STEP: "+(cur+1)+"/14";document.getElementById("q").style.display="block";document.getElementById("qt").innerText=tasks[cur].q;const b=document.getElementById("as");b.innerHTML="";tasks[cur].a.forEach((t,idx)=>{const btn=document.createElement("button");btn.className="bt";btn.innerText=t;btn.onclick=()=>{if(idx===0){cur++;document.getElementById("q").style.display="none";upd();setTimeout(uQ,600)}else{liv--;document.getElementById("hp").innerText="❤️ ".repeat(liv);if(liv<=0)f(false)}};b.appendChild(btn)})}function f(win){const b=document.getElementById("q");b.style.display="block";b.innerHTML="<h2>"+(win?"${wm}":"${lm}")+"</h2><button class=\'bt\' onclick=\'location.reload()\'>RESTART</button>"}upd();uQ();<\/script></body></html>' style='width:100%;height:600px;border:none;'></iframe>`.replace(/\n/g, '');
    }

    function draw() { document.getElementById('f-box').innerHTML = getCode(); }
    function copyIt() { const el = document.createElement('textarea'); el.value = getCode(); document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert("Код готов!"); }
    render(); draw();
</script>
</body>
</html>
