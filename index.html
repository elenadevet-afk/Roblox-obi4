<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Genially Game Builder v17.0</title>
    <style>
        :root { --accent: #bc13fe; }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #111; color: white; }
        #panel { width: 360px; background: #1a1a1a; padding: 20px; overflow-y: auto; border-right: 2px solid var(--accent); }
        .card { background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        input { width: 100%; padding: 8px; margin: 5px 0; background: #000; color: #00f7ff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        label { font-size: 11px; color: #888; text-transform: uppercase; display: block; margin-top: 10px; }
        #view { flex-grow: 1; padding: 20px; background: #000; display: flex; flex-direction: column; }
        .preview-win { flex-grow: 1; border: 1px solid #333; border-radius: 12px; overflow: hidden; background: #050505; position: relative; }
        .btn-copy { background: var(--accent); color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Editor v17.0</h2>
    <label>Герой (Котик):</label>
    <input type="text" id="h-url" value="https://cdn-icons-png.flaticon.com/512/616/616430.png" oninput="draw()">
    <label>Цвет лестницы:</label>
    <input type="color" id="h-col" value="#bc13fe" oninput="draw()">
    <label>Победа:</label>
    <input type="text" id="w-msg" value="YOU ARE THE BEST!" oninput="draw()">
    <label>Проигрыш:</label>
    <input type="text" id="l-msg" value="TRY AGAIN!" oninput="draw()">
    
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyIt()">СКОПИРОВАТЬ КОД</button>
</div>

<div id="view">
    <div id="f-box" class="preview-win"></div>
</div>

<script>
    let qs = Array(14).fill().map((_, i) => ({ q: `Question ${i+1}?`, a: ["Right", "Wrong", "Wrong"], c: 0 }));

    function render() {
        const c = document.getElementById('q-list'); c.innerHTML = '';
        qs.forEach((q, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<input type="text" value="${q.q}" oninput="qs[${i}].q=this.value;draw()">
            <div style="display:flex;gap:2px"><input type="text" value="${q.a[0]}" oninput="qs[${i}].a[0]=this.value;draw()"><input type="text" value="${q.a[1]}" oninput="qs[${i}].a[1]=this.value;draw()"><input type="text" value="${q.a[2]}" oninput="qs[${i}].a[2]=this.value;draw()"></div>`;
            c.appendChild(d);
        });
    }

    function getCode() {
        const h = document.getElementById('h-url').value;
        const col = document.getElementById('h-col').value;
        const win = document.getElementById('w-msg').value;
        const lose = document.getElementById('l-msg').value;
        const data = JSON.stringify(qs);

        // Генерируем HTML для платформ заранее
        let stepsHtml = '';
        for(let i=0; i<15; i++) {
            stepsHtml += `<div id="s${i}" class="step" style="left:${5+i*6}%; bottom:${10+i*5}%"></div>`;
        }

        return `<iframe srcdoc='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body,html{margin:0;padding:0;overflow:hidden;background:#000;height:100vh;width:100vw;font-family:sans-serif}.step{position:absolute;width:40px;height:8px;background:${col};border-radius:10px;box-shadow:0 0 10px ${col};opacity:0.2;transition:0.3s}.step.on{opacity:1;box-shadow:0 0 20px ${col}}#hero{position:absolute;width:40px;height:50px;z-index:10;transition:0.5s;bottom:0;left:0}#box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(20,20,20,0.95);border:2px solid ${col};border-radius:20px;padding:20px;width:240px;color:#fff;text-align:center;z-index:100}#ui{position:absolute;top:10px;left:10px;color:#fff;z-index:110;display:flex;gap:5px}.inf{background:rgba(0,0,0,0.8);padding:5px 10px;border-radius:8px;border:1px solid ${col};font-size:12px}.btn{background:rgba(255,255,255,0.1);border:1px solid ${col};color:#fff;width:100%;padding:10px;margin:5px 0;border-radius:10px;cursor:pointer;font-weight:bold}</style></head><body><div id="ui"><div class="inf" id="hp">❤️ ❤️ ❤️</div><div class="inf" id="st">STEP: 1/14</div></div>${stepsHtml}<img id="hero" src="${h}"><div id="box"><div id="qt" style="font-size:16px;margin-bottom:10px"></div><div id="as"></div></div><script>const tasks=${data};let cur=0,liv=3;const hr=document.getElementById("hero");function upd(){const t=document.getElementById("s"+cur);hr.style.left=t.style.left;hr.style.bottom=(parseInt(t.style.bottom)+2)+"%";document.getElementById("s"+cur).classList.add("on")}function ask(){if(cur>=14){fin(true);return}document.getElementById("st").innerText="STEP: "+(cur+1)+"/14";const b=document.getElementById("box");b.style.display="block";document.getElementById("qt").innerText=tasks[cur].q;const a=document.getElementById("as");a.innerHTML="";tasks[cur].a.forEach((t,i)=>{const btn=document.createElement("button");btn.className="btn";btn.innerText=t;btn.onclick=()=>{if(i===0){cur++;b.style.display="none";upd();setTimeout(ask,600)}else{liv--;document.getElementById("hp").innerText="❤️ ".repeat(liv);if(liv<=0)fin(false)}};a.appendChild(btn)})}function fin(w){const b=document.getElementById("box");b.style.display="block";b.innerHTML="<h2>"+(w?"${win}":"${lose}")+"</h2><button class=\'btn\' onclick=\'location.reload()\'>RESTART</button>"}upd();ask();<\/script></body></html>' style='width:100%;height:600px;border:none;'></iframe>`.replace(/\n/g, '');
    }

    function draw() { document.getElementById('f-box').innerHTML = getCode(); }
    function copyIt() { const el = document.createElement('textarea'); el.value = getCode(); document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert("Готово!"); }
    render(); draw();
</script>
</body>
</html>
